<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ruffle Fullscreen</title>

  <!-- Ruffle -->
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    #container {
      width: 100%;
      height: 100%;
    }

    ruffle-player {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <div id="container"></div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();

      player.style.width = "100%";
      player.style.height = "100%";

      document.getElementById("container").appendChild(player);

      player.load("game.swf"); // 🔁 change to your SWF
    });
  </script>

</body>
</html>
