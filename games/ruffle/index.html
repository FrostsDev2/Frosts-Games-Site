<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ruffle SWF Loader</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
    #container { width: 100%; height: 100%; }
    ruffle-player { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="container"></div>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const swfFile = urlParams.get('swf');
      
      if (!swfFile) {
        document.body.innerHTML = '<div style="color:white;padding:20px;text-align:center;">No SWF file specified. Add ?swf=path/to/game.swf to URL</div>';
        return;
      }
      
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      const container = document.getElementById('container');
      
      container.appendChild(player);
      
      player.load({
        url: swfFile,
        allowScriptAccess: true,
        backgroundColor: "#000000"
      }).catch(error => {
        console.error("Error:", error);
        container.innerHTML = `<div style="color:white;padding:20px;text-align:center;">Error loading ${swfFile}: ${error.message}</div>`;
      });
    });
  </script>
</body>
</html>
