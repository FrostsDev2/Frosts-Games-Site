<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Embed</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <iframe
        src="https://kazw.net/service/https%3A%2F%2Fduckduckgo.com%2F"
        allowfullscreen
        sandbox="allow-scripts allow-same-origin allow-forms"
    >
        Your browser does not support iframes.
    </iframe>
</body>
</html>
