<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frosts Games Update</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #070012;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
  color: white;
}

/* Mouse glow */
#mouseGlow {
  position: fixed;
  width: 280px;
  height: 280px;
  background: radial-gradient(circle, rgba(200,160,255,0.22), transparent 70%);
  pointer-events: none;
  transform: translate(-50%, -50%);
  filter: blur(14px);
}

/* Center layout */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
}

/* Logo */
.logo {
  width: 140px;
  margin-bottom: 15px;
  filter: drop-shadow(0 0 15px rgba(210,160,255,0.5));
  animation: fadeIn 1.5s ease-out;
}

/* Title */
h1 {
  font-size: 3rem;
  font-weight: 600;
  color: #d9b3ff;
  letter-spacing: 1px;
  animation: floatText 4s ease-in-out infinite;
  text-shadow: 0 0 10px rgba(210,160,255,0.35);
}

/* Subtitle */
h2 {
  margin-top: 12px;
  font-size: 1.3rem;
  font-weight: 300;
  color: #caa6ff;
  opacity: 0.9;
  animation: fadeUp 2.5s ease-out;
}

/* Button */
.btn {
  display: inline-block;
  margin-top: 22px;
  padding: 12px 26px;
  font-size: 1rem;
  font-weight: 500;
  color: #1a001f;
  background: #d9b3ff;
  border-radius: 12px;
  text-decoration: none;
  transition: 0.3s ease;
  box-shadow: 0 0 15px rgba(210,160,255,0.3);
  animation: fadeUp 2.8s ease-out;
}

.btn:hover {
  transform: translateY(-3px) scale(1.05);
  background: #e8ccff;
  box-shadow: 0 0 25px rgba(210,160,255,0.6);
}

/* Animations */
@keyframes floatText {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

/* Rain */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}
</style>
</head>

<body>

<div id="mouseGlow"></div>
<canvas id="rain"></canvas>

<div class="center">

  <!-- LOGO -->
  <img src="lunar.png" class="logo" alt="Lunar Logo">

  <h1>Frosts Games has been updated!</h1>
  <h2>Welcome To Project Lunar</h2>

  <a class="btn" href="https://lunar-gamess.vercel.app">
    Continue To Lunar
  </a>
</div>

<script>
// Mouse glow
const glow = document.getElementById("mouseGlow");

document.addEventListener("mousemove", (e) => {
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});

// Rain
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const drops = [];

for (let i = 0; i < 140; i++) {
  drops.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    len: Math.random() * 18 + 8,
    speed: Math.random() * 4 + 2
  });
}

function rain() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "rgba(210, 160, 255, 0.35)";
  ctx.lineWidth = 1;

  for (let d of drops) {
    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(d.x, d.y + d.len);
    ctx.stroke();

    d.y += d.speed;

    if (d.y > canvas.height) {
      d.y = -20;
      d.x = Math.random() * canvas.width;
    }
  }

  requestAnimationFrame(rain);
}

rain();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
